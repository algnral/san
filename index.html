<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إصدار الشهادات التلقائي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #1d4ed8; }
        #previewCanvas { width: 100%; height: auto; border: 1px solid #ccc; margin-top: 20px; display: none; }
        .history { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 14px; }
        th { background-color: #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 صانع الشهادات الذكي</h2>
    
    <div class="form-group">
        <label>قالب الشهادة (صورة):</label>
        <input type="file" id="templateInput" accept="image/*">
    </div>

    <div class="form-group">
        <label>اسم الطالب:</label>
        <input type="text" id="studentName" placeholder="أدخل الاسم الرباعي">
    </div>

    <div class="form-group">
        <label>صورة الطالب الشخصية:</label>
        <input type="file" id="studentPhoto" accept="image/*">
    </div>

    <div class="form-group">
        <label>لغة الشهادة:</label>
        <select id="certLang">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
    </div>

    <button class="btn" onclick="generateCertificate()">إصدار الشهادة وحفظها PDF</button>

    <canvas id="previewCanvas"></canvas>

    <div class="history">
        <h3>سجل الشهادات المصدرة (السيستم المحلي)</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>ID الشهادة</th>
                    <th>الاسم</th>
                    <th>تاريخ الإصدار</th>
                    <th>تاريخ الانتهاء</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const canvas = document.getElementById('previewCanvas');
    const ctx = canvas.getContext('2d');
    let certHistory = JSON.parse(localStorage.getItem('certHistory')) || [];

    // تحديث الجدول عند التحميل
    window.onload = updateHistoryTable;

    async function generateCertificate() {
        const templateFile = document.getElementById('templateInput').files[0];
        const studentName = document.getElementById('studentName').value;
        const studentPhoto = document.getElementById('studentPhoto').files[0];
        const lang = document.getElementById('certLang').value;

        if (!templateFile || !studentName) {
            alert("لطفاً اختر القالب واكتب اسم الطالب");
            return;
        }

        const img = new Image();
        img.src = URL.createObjectURL(templateFile);
        
        img.onload = async () => {
            // إعدادات الكانفاس (أبعاد الصورة الأصلية)
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);

            // 1. إنشاء التواريخ
            const now = new Date();
            const expiry = new Date();
            expiry.setFullYear(now.getFullYear() + 1); // الانتهاء بعد سنة

            const dateStr = now.toLocaleDateString(lang === 'ar' ? 'ar-SA' : 'en-US');
            const expiryStr = expiry.toLocaleDateString(lang === 'ar' ? 'ar-SA' : 'en-US');
            const certID = "CERT-" + Math.floor(Math.random() * 1000000);

            // 2. تنسيق الخط والكتابة
            ctx.fillStyle = "#000"; // لون الخط
            ctx.textAlign = "center";
            
            // الاسم (المكان تقريبي، يمكنك تعديله)
            ctx.font = "bold 50px Arial";
            ctx.fillText(studentName, canvas.width / 2, canvas.height / 2);

            // التواريخ والـ ID (تعديل الإحداثيات حسب قالبك)
            ctx.font = "25px Arial";
            ctx.fillText(`ID: ${certID}`, canvas.width / 2, canvas.height - 100);
            ctx.fillText(`إصدار: ${dateStr} | انتهاء: ${expiryStr}`, canvas.width / 2, canvas.height - 150);

            // 3. إضافة صورة الطالب لو وجدت
            if (studentPhoto) {
                const pImg = await loadImage(URL.createObjectURL(studentPhoto));
                ctx.drawImage(pImg, 100, 100, 150, 150); // مكان الصورة (x, y, width, height)
            }

            // 4. حفظ في PDF
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jspdf.jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
            pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
            pdf.save(`${studentName}_Certificate.pdf`);

            // 5. الحفظ في "السيستم" (LocalStorage)
            const record = { certID, studentName, dateStr, expiryStr };
            certHistory.push(record);
            localStorage.setItem('certHistory', JSON.stringify(certHistory));
            updateHistoryTable();
        };
    }

    function loadImage(url) {
        return new Promise(resolve => { const i = new Image(); i.onload = () => resolve(i); i.src = url; });
    }

    function updateHistoryTable() {
        const tbody = document.querySelector("#historyTable tbody");
        tbody.innerHTML = "";
        certHistory.slice().reverse().forEach(item => {
            const row = `<tr><td>${item.certID}</td><td>${item.studentName}</td><td>${item.dateStr}</td><td>${item.expiryStr}</td></tr>`;
            tbody.innerHTML += row;
        });
    }
</script>

</body>
</html>
